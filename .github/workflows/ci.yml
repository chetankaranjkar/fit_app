name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend-checks:
    name: Backend Build + Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore GymManagement.sln

      - name: Build
        run: dotnet build GymManagement.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GymManagement.sln --configuration Release --no-build

  frontend-checks:
    name: Frontend Typecheck + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gym_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gym_client/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  e2e-smoke:
    name: Smoke E2E
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    defaults:
      run:
        working-directory: gym_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gym_client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        run: npm run e2e:smoke:ci
        env:
          E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME || 'admin@gym.com' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'admin123' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: gym_client/playwright-report
          if-no-files-found: ignore

