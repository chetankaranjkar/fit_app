# Safer override: bind SQL to VPS loopback only (SSH tunnel → SSMS).
# Use when you do NOT want SQL reachable on the public IP.
#
#   ./deploy/scripts/enable-db-tunnel.sh
#
# From Windows:  ssh -N -L 14333:127.0.0.1:1433 root@YOUR_VPS_IP
# SSMS:         localhost,14333  |  sa  |  GymManagementDb

services:
  sqlserver:
    ports:
      - "127.0.0.1:1433:1433"
