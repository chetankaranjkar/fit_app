# Testing overlay — no domain, no SSL. Use with:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.testing.yml --env-file deploy/.env up -d
#
# App is available at http://YOUR_VPS_PUBLIC_IP  (port 80)

services:
  api:
    ports: []
    environment:
      Cors__AllowedOrigins__0: http://${VPS_IP:?Set VPS_IP in deploy/.env}
      Cors__AllowedOrigins__1: http://${VPS_IP}:80

  frontend:
    ports: []

  exercise-api:
    ports: []

  gateway:
    image: nginx:1.27-alpine
    container_name: gym-gateway
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
      exercise-api:
        condition: service_started
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./docker/gateway/nginx.testing.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gym_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    mem_limit: 32m
