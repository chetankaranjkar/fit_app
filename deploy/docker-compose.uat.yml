# UAT stack — runs beside production on the same VPS (different host ports + volumes).
#
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.uat.yml \
#     --env-file deploy/.env.uat up -d
#
# Public URL: https://uat.tigerfitness.tech (host Nginx — see deploy/scripts/setup-nginx-uat.sh)

name: gym-uat

services:
  sqlserver:
    container_name: gym-uat-sqlserver
    # Replace base compose ports (else both 1434:1433 and 127.0.0.1:1434:1433 bind → "address already in use").
    ports: !override
      - "127.0.0.1:${SQLSERVER_PUBLISH_PORT:-1434}:1433"

  redis:
    container_name: gym-uat-redis

  api:
    container_name: gym-uat-api
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
    ports: !override
      - "127.0.0.1:${API_HOST_PORT:-5105}:8080"

  exercise-api:
    container_name: gym-uat-exercise-api
    ports: !override
      - "127.0.0.1:${EXERCISE_API_HOST_PORT:-4301}:4300"

  frontend:
    container_name: gym-uat-frontend
    ports: !override
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8081}:80"

volumes:
  sqlserver_data:
    name: gym_uat_sqlserver_data
  api_uploads:
    name: gym_uat_api_uploads
