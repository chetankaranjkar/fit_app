name: pulsefit
description: PulseFit — member training, workout logging, and gym access.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # HTTP + JSON
  dio: ^5.7.0

  # Local secure storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI niceties
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  cached_network_image: ^3.4.1
  glassmorphism: ^3.0.0
  lottie: ^3.1.2

  # Images & capture (profile + transformation photos)
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  image_cropper: ^8.0.2
  file_picker: ^8.1.6
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0
  image: ^4.3.0

  # QR / camera attendance
  mobile_scanner: ^5.2.3
  geolocator: ^13.0.2
  uuid: ^4.5.1

  # Network state for sync indicator
  connectivity_plus: ^6.1.0

  # Structured offline workout persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
